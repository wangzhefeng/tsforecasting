version: 1
config_root: configs/examples
scripts_root: scripts
groups:
  ett_small:
    config_dir: configs/examples/ett_small
    scripts_dir: scripts/ett_small
    entries:
      - name: stats
        command: run
        config: configs/examples/ett_small/stats.yaml
        script: scripts/ett_small/run_stats.sh
      - name: ml
        command: run
        config: configs/examples/ett_small/ml.yaml
        script: scripts/ett_small/run_ml.sh
      - name: neural
        command: run
        config: configs/examples/ett_small/neural.yaml
        script: scripts/ett_small/run_neural.sh
      - name: intervals
        command: run
        config: configs/examples/ett_small/intervals.yaml
        script: scripts/ett_small/run_intervals.sh
      - name: intervals_mixed
        command: run
        config: configs/examples/ett_small/intervals_mixed.yaml
        script: scripts/ett_small/run_intervals_mixed.sh
  tourism_small:
    config_dir: configs/examples/tourism_small
    scripts_dir: scripts/tourism_small
    entries:
      - name: hierarchical
        command: reconcile
        config: configs/examples/tourism_small/hierarchical.yaml
        script: scripts/tourism_small/run_hierarchical.sh
