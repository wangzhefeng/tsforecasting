# Phase-2 example: StatsForecast point forecasts with prediction intervals.
version: 2
task: forecast

data:
  path: dataset/ett_small/ETTh1.csv
  time_col: date
  target_col: OT
  id_col: null
  freq: 1h

split:
  horizon: 24
  n_windows: 3
  step_size: 24

models:
  statsforecast:
    - name: seasonal_naive
      params:
        season_length: 24
    - name: auto_ets
      params:
        season_length: 24

prediction_intervals:
  levels: [80, 95]

evaluation:
  metrics: [mae, rmse, mape, smape]
  rank_metric: mae

forecast:
  horizon: 24

runtime:
  collect_timing: true
  log_name: ett_small_intervals
  log_level: INFO

output:
  dir: results/ett_small_intervals
  save_plots: false

seed: 0
