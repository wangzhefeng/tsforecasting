# Phase-2 example: prediction intervals across all three forecast backends.
version: 2
task: forecast

data:
  path: dataset/ett_small/ETTh1.csv
  time_col: date
  target_col: OT
  id_col: null
  freq: 1h

split:
  horizon: 24
  n_windows: 3
  step_size: 24

models:
  statsforecast:
    - name: seasonal_naive
      params:
        season_length: 24
  mlforecast:
    framework:
      lags: [1, 24]
      date_features: ["hour"]
    models:
      - name: linear_regression
        params: {}
  neuralforecast:
    - name: nhits_quantile
      params:
        h: 24
        input_size: 48
        max_steps: 30
        enable_progress_bar: false
        loss:
          class: neuralforecast.losses.pytorch.MQLoss
          kwargs:
            quantiles: [0.1, 0.5, 0.9]

prediction_intervals:
  levels: [80]

evaluation:
  metrics: [mae, rmse, mape, smape]
  rank_metric: mae

forecast:
  horizon: 24

runtime:
  collect_timing: true
  log_name: intervals_mixed
  log_level: INFO

output:
  dir: results/intervals_mixed
  save_plots: false

seed: 0
