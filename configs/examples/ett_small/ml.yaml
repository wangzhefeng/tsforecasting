# MVP-1 example: mixed StatsForecast baseline + MLForecast sklearn presets.
version: 2
task: forecast

data:
  path: dataset/ett_small/ETTh1.csv
  time_col: date
  target_col: OT
  id_col: null
  freq: 1h

split:
  horizon: 24
  n_windows: 3
  step_size: 24

models:
  statsforecast:
    - name: seasonal_naive
      params:
        season_length: 24
  mlforecast:
    framework:
      lags: [1, 24]
      date_features: ["hour"]
      target_transforms:
        - class: mlforecast.target_transforms.Differences
          args: [[24]]
    models:
      - name: linear_regression
        params: {}
      - name: random_forest
        params:
          n_estimators: 100
          random_state: 0

evaluation:
  metrics: [mae, rmse, mape, smape]
  rank_metric: mae

forecast:
  horizon: 24

runtime:
  collect_timing: true
  log_name: ett_small_ml
  log_level: INFO

output:
  dir: results/ett_small_ml
  save_plots: false

seed: 0
