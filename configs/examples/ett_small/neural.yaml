# MVP-1 example: mixed StatsForecast baseline + NeuralForecast NHITS CPU smoke.
version: 2
task: forecast

data:
  path: dataset/ett_small/ETTh1.csv
  time_col: date
  target_col: OT
  id_col: null
  freq: 1h

split:
  horizon: 24
  n_windows: 3
  step_size: 24

models:
  statsforecast:
    - name: seasonal_naive
      params:
        season_length: 24
  neuralforecast:
    - name: nhits
      params:
        h: 24
        input_size: 48
        max_steps: 50
        enable_progress_bar: false
        random_seed: 0

evaluation:
  metrics: [mae, rmse, mape, smape]
  rank_metric: mae

forecast:
  horizon: 24

runtime:
  collect_timing: true
  log_name: ett_small_neural
  log_level: INFO

output:
  dir: results/ett_small_neural
  save_plots: false

seed: 0
